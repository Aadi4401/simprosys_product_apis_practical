
services:
  mongodb:
    image: mongo
    ports:
      - "27017:27017"
  redis:
    image: redis
    ports:
      - "6379:6379"
  auth:
    build: ./auth
    ports:
      - "8001:8000"
    env_file:
      - .env
  product:
    build: ./product
    ports:
      - "8002:8000"
    env_file:
      - .env
    depends_on:
      - mongodb
      - auth
  category:
    build: ./category
    ports:
      - "8003:8000"
    env_file:
      - .env
    depends_on:
      - mongodb
      - auth
  celery_worker:
    build: ./celery_worker
    depends_on:
      - mongodb
      - redis
  
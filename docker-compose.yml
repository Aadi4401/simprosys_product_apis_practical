version: '3'
services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    redis:
      image: redis:alpine
      container_name: redis
      ports:
        - "6379:6379"
    auth:
      build: ./auth
      ports:
        - "8001:8000"
    product:
      build: ./product
      ports:
        - "8002:8000"
      depends_on:
        - mongodb
    category:
      build: ./category 
      ports:
        - "8003:8000"
      depends_on:
        - mongodb
    celery_worker:
      build: ./celery_worker
      depends_on:
        - mongodb
        - redis